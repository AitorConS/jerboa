title: Uni — Unikernel Engine
description: A Docker-like engine for building, running, and orchestrating unikernel VMs
baseurl: "/UniCli"
url: "https://aitorcons.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

aux_links:
  "GitHub":
    - "https://github.com/AitorConS/UniCli"

aux_links_new_tab: true

footer_content: "Released under the MIT License."

search_enabled: true
search:
  heading_level: 2
  previews: 3

nav_sort: order

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
