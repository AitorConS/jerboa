version: "2"
linters:
  enable:
    # existing
    - bodyclose
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - revive
    - staticcheck
    - wrapcheck
    # error handling
    - errorlint      # errors.Is/As instead of == for wrapped errors
    - nilerr         # return nil when err != nil (hiding errors)
    # security
    - gosec          # path traversal, hardcoded credentials, weak crypto, etc.
    # code quality
    - misspell       # typos in comments and string literals
    - unparam        # function parameters always passed the same constant value
    - usestdlibvars  # http.MethodGet, http.StatusOK instead of magic strings/numbers
    - noctx          # http.Get / http.Post calls without a context
    # test quality
    - testifylint    # testify anti-patterns (assert vs require, wrong arg order)

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
    wrapcheck:
      ignore-package-globs:
        - github.com/AitorConS/jerboa/*
    gosec:
      excludes:
        - G304  # file path from variable — expected in a CLI tool
        - G107  # URL from variable — expected when calling package registries
        - G306  # file permissions — we use 0755 for executables intentionally
        - G110  # decompression bomb — we trust package archives from ops registry
        - G115  # integer overflow in file mode cast — int64 mode is always small
        - G305  # file traversal in tar extraction — paths are cleaned via filepath.Join
        - G602  # slice index out of range — false positive; loop bounds prevent OOB
        - G118  # context.Background in shutdown goroutine — intentional
        - G703  # path traversal in cgroup — writes to controlled /sys/fs/cgroup paths
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    misspell:
      locale: US

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # In test files: relax linters that don't apply well to test helpers
      - linters:
          - errcheck
          - wrapcheck
          - gosec
          - unparam
          - noctx       # exec.Command / net.Dial in test helpers don't need context
        path: _test\.go

      # Smoke-test binary: invokes the real CLI via exec.Command by design
      - linters:
          - noctx
          - unparam
        path: ^cmd/jerboa-smoke/

      # Network package: iptables/ip system calls have no meaningful context to pass
      - linters:
          - noctx
          - unparam
        path: ^internal/network/

      # Examples are intentionally simple demo programs, not production-grade code
      - linters:
          - gosec
          - noctx
          - unparam
        path: ^examples/

    paths:
      - ^third_party/
      - ^examples/

issues:
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - ^third_party/
      - ^examples/
