# Seed config for the same package, selected with: jerboa build . -f unikernel.init.toml
# Runs initdb once to initialise the data directory on the pgdata volume.
[build]
lang = "raw"
dirs = ["/var/lib/postgresql/data"]

[program]
path = "initdb"
args = [
  "-D", "/var/lib/postgresql/data",
  "--auth=trust",
]

[run]
memory = "512M"
