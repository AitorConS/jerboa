# Open pg_hba.conf for the demo unikernel, copied into the image at /pg_hba.conf
# and selected with `-c hba_file=/pg_hba.conf` (see unikernel.toml).
#
# The pre-initialized data directory baked into the eyberg/postgresql package
# only trusts 127.0.0.1 and the old SLIRP host (10.0.2.2), so a client on a
# jerboa bridge network (e.g. 10.100.0.0/24) would be rejected. This file trusts
# any host on the private 10.0.0.0/8 range (which covers jerboa bridge subnets)
# with no password — fine for a local demo, NOT for production. Narrow the CIDR
# to your actual bridge subnet for a tighter rule.
#
# TYPE  DATABASE  USER  ADDRESS         METHOD
local   all       all                   trust
host    all       all   127.0.0.1/32    trust
host    all       all   10.0.0.0/8      trust
