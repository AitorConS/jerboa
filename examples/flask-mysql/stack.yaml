version: "1"

# A two-service stack: a MySQL unikernel and a Flask unikernel that renders its
# rows as HTML. Both join the `app` network and reach each other by service name
# over the daemon's guest DNS — the web app connects to MySQL at host `db`.
#
# Build the two images first (see README.md), then:
#   jerboa compose up stack.yaml
#   jerboa compose ps stack.yaml
#   # browse http://localhost:8080
#   jerboa compose down stack.yaml

services:
  db:
    image: mysql:latest
    memory: 512M
    networks: [app]
    ports:
      - "3306:3306"
    # Data is ephemeral: mysqld uses the pre-initialized /var/lib/mysql baked
    # into the image, and the `demo` database is (re)created by the web app on
    # first request. For persistence across VM recreation, seed a volume and
    # mount it here — see the "Persistence" section in README.md.

  web:
    image: flask-mysql:latest
    memory: 256M
    depends_on: [db]
    networks: [app]
    ports:
      - "8080:8080"
    environment:
      - MYSQL_HOST=db          # resolved to the db VM by the guest DNS server
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root     # eyberg/mysql ships a wide-open root/root account
      - MYSQL_DATABASE=demo
    health_check: "tcp:8080"
    restart: "on-failure:5"

networks:
  app:
    driver: bridge
    subnet: 10.100.0.0/24
