version: "1"

# Flask + PostgreSQL, both as unikernels. The web app reaches PostgreSQL by
# service name (`db`) over the daemon's guest DNS.
#
#   jerboa compose up stack.yaml
#   # browse http://localhost:8080
#   jerboa compose down stack.yaml

services:
  db:
    image: postgresql:latest
    memory: 512M
    networks: [app]
    ports:
      - "5432:5432"
    # Ephemeral data: postgres uses the pre-initialized /db baked into the image
    # (the app's `people` table is recreated on first request). The image also
    # bakes an open /pg_hba.conf so bridge clients can connect — see
    # examples/postgresql.

  web:
    image: flask-postgres:latest
    memory: 256M
    depends_on: [db]
    networks: [app]
    ports:
      - "8080:8080"
    environment:
      - PGHOST=db              # resolved to the db VM by the guest DNS server
      - PGPORT=5432
      - PGUSER=eyberg          # superuser baked into the eyberg/postgresql data dir
      - PGDATABASE=postgres
    health_check: "tcp:8080"
    restart: "on-failure:5"

networks:
  app:
    driver: bridge
    subnet: 10.100.0.0/24
