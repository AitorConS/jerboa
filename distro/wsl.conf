# WSL2 configuration baked into the jerboa distro.
[user]
# Interactive shells land on the dedicated jerboa user; the daemon is launched
# explicitly as root (wsl -u root) when firecracker needs privileges.
default=jerboa

[network]
generateResolvConf=true

[interop]
enabled=true
# Do not leak the Windows PATH into the distro: keep the environment hermetic.
appendWindowsPath=false

[boot]
systemd=false
# Firecracker needs /dev/kvm inside this WSL2 VM. The Microsoft WSL2 kernel ships
# KVM as a module (CONFIG_KVM=m) and does not auto-load it, so load it at boot via
# a script (an inline command with quotes is re-split by WSL's shell and breaks).
# Requires nested virtualization on the host: set nestedVirtualization=true in
# %USERPROFILE%\.wslconfig.
command=/usr/local/sbin/load-kvm.sh
