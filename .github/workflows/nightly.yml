name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:      # allow manual trigger

# Only one nightly at a time.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (self-hosted)
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: go1.24.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run unit tests
        run: go test ./cmd/... ./internal/... ./pkg/... -race -count=1 -coverprofile=coverage.out -covermode=atomic

  kernel-tests:
    name: Full Kernel Test Suite
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-system-x86

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build kernel
        run: make kernel

      - name: Run kernel test suite
        run: make test-kernel

  integration-tests:
    name: Integration Tests
    needs: [unit-tests]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 20
    env:
      GOTOOLCHAIN: go1.24.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build CLI binaries
        run: make build

      - name: Run integration tests
        run: go test -tags integration -count=1 -timeout 10m -v ./tests/integration/...

  benchmarks:
    name: Benchmark Suite
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 30
    env:
      GOTOOLCHAIN: go1.24.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run benchmarks
        run: go test ./... -bench=. -benchmem -benchtime=5s -count=3 | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results.txt

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: go1.24.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, kernel-tests, integration-tests, benchmarks, security-scan]
    if: failure()
    steps:
      - name: Notify
        # TODO: configure NOTIFY_WEBHOOK secret in repo settings
        # Supports Discord or Slack — set NOTIFY_TYPE to "discord" or "slack"
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
          NOTIFY_TYPE: ${{ vars.NOTIFY_TYPE }}  # "discord" or "slack"
        run: |
          PAYLOAD="{\"content\": \"🔴 Nightly CI failed on \`main\`. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          if [ "$NOTIFY_TYPE" = "slack" ]; then
            PAYLOAD="{\"text\": \"🔴 Nightly CI failed on \`main\`. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
          curl -s -X POST "$NOTIFY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"