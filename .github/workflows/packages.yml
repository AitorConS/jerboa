name: Package Build

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (e.g. node, python, all)'
        required: true
        default: 'all'
      version:
        description: 'Version override (e.g. v20.11.0, leave empty for default)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-package:
    name: Build ${{ matrix.package }}:${{ matrix.version }}
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          # Language runtimes
          - package: node
            version: "20.11.0"
            source_url: "https://nodejs.org/dist/v20.11.0/node-v20.11.0-linux-x64.tar.xz"
            build_script: "scripts/build-node.sh"
          - package: node
            version: "22.0.0"
            source_url: "https://nodejs.org/dist/v22.0.0/node-v22.0.0-linux-x64.tar.xz"
            build_script: "scripts/build-node.sh"
          - package: python
            version: "3.12.0"
            source_url: "https://www.python.org/ftp/python/3.12.0/Python-3.12.0.tar.xz"
            build_script: "scripts/build-python.sh"
          - package: python
            version: "3.11.0"
            source_url: "https://www.python.org/ftp/python/3.11.0/Python-3.11.0.tar.xz"
            build_script: "scripts/build-python.sh"
          - package: ruby
            version: "3.2.2"
            source_url: "https://cache.ruby-lang.org/pub/ruby/3.2/ruby-3.2.2.tar.gz"
            build_script: "scripts/build-ruby.sh"
          - package: lua
            version: "5.4.6"
            source_url: "https://www.lua.org/ftp/lua-5.4.6.tar.gz"
            build_script: "scripts/build-lua.sh"
          - package: php
            version: "8.3.0"
            source_url: "https://www.php.net/distributions/php-8.3.0.tar.xz"
            build_script: "scripts/build-php.sh"
          # Web servers
          - package: nginx
            version: "1.24.0"
            source_url: "https://nginx.org/download/nginx-1.24.0.tar.gz"
            build_script: "scripts/build-nginx.sh"
          - package: caddy
            version: "2.7.6"
            source_url: "https://github.com/caddyserver/caddy/archive/refs/tags/v2.7.6.tar.gz"
            build_script: "scripts/build-caddy.sh"
          # Databases & data stores
          - package: redis
            version: "7.2.4"
            source_url: "https://github.com/redis/redis/archive/refs/tags/v7.2.4.tar.gz"
            build_script: "scripts/build-redis.sh"
          - package: sqlite
            version: "3.45.0"
            source_url: "https://www.sqlite.org/2024/sqlite-tools-linux-x64-3450000.zip"
            build_script: "scripts/build-sqlite.sh"
          # Tools
          - package: curl
            version: "8.6.0"
            source_url: "https://curl.se/download/curl-8.6.0.tar.gz"
            build_script: "scripts/build-curl.sh"
          - package: jq
            version: "1.7.1"
            source_url: "https://github.com/jqlang/jq/archive/refs/tags/jq-1.7.1.tar.gz"
            build_script: "scripts/build-jq.sh"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build CLI binaries
        run: make build

      - name: Build package
        env:
          PACKAGE_NAME: ${{ matrix.package }}
          PACKAGE_VERSION: ${{ matrix.version }}
          SOURCE_URL: ${{ matrix.source_url }}
        run: |
          if [ -f "${{ matrix.build_script }}" ]; then
            bash "${{ matrix.build_script }}"
          else
            echo "Build script ${{ matrix.build_script }} not found — skipping"
            exit 1
          fi

      - name: Create package archive
        run: |
          BINARY="dist/pkg/${{ matrix.package }}/${{ matrix.version }}"
          if [ ! -d "$BINARY" ]; then
            echo "Error: package output directory not found at $BINARY"
            exit 1
          fi
          ./dist/jerboa pkg create ${{ matrix.package }}:${{ matrix.version }} \
            "$BINARY" \
            --description "${{ matrix.package }} ${{ matrix.version }} runtime" \
            --runtime ${{ matrix.package }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.package }}-${{ matrix.version }}
          path: |
            ~/.jerboa/packages/${{ matrix.package }}/${{ matrix.version }}/

  publish-index:
    name: Update Package Index
    needs: [build-package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: dist/packages/
          merge-multiple: true

      - name: Rebuild package index
        run: |
          echo "Package index rebuild is manual until the index server is deployed."
          echo "Artifacts are available in this workflow run for manual upload."