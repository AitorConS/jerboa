name: Package Build

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (e.g. node, python, all)'
        required: true
        default: 'all'
      version:
        description: 'Version tag (e.g. v20.11.0)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-package:
    name: Build ${{ matrix.package }}:${{ matrix.version }}
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - package: node
            version: "20.11.0"
            source_url: "https://nodejs.org/dist/v20.11.0/node-v20.11.0-linux-x64.tar.xz"
            build_script: "scripts/build-node.sh"
          - package: python
            version: "3.12.0"
            source_url: "https://www.python.org/ftp/python/3.12.0/Python-3.12.0.tar.xz"
            build_script: "scripts/build-python.sh"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build CLI binaries
        run: make build

      - name: Build package
        env:
          PACKAGE_NAME: ${{ matrix.package }}
          PACKAGE_VERSION: ${{ matrix.version }}
          SOURCE_URL: ${{ matrix.source_url }}
        run: |
          if [ -f "${{ matrix.build_script }}" ]; then
            bash "${{ matrix.build_script }}"
          else
            echo "Build script ${{ matrix.build_script }} not found — skipping"
            exit 1
          fi

      - name: Create package archive
        run: |
          dist/pkg/${{ matrix.package }}/${{ matrix.version }}
          ./dist/uni pkg create ${{ matrix.package }}:${{ matrix.version }} \
            dist/pkg/${{ matrix.package }}/${{ matrix.version }}/binary \
            --description "${{ matrix.package }} ${{ matrix.version }} runtime" \
            --runtime ${{ matrix.package }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.package }}-${{ matrix.version }}
          path: |
            dist/uni
            dist/unid

  publish-index:
    name: Update Package Index
    needs: [build-package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: dist/packages/
          merge-multiple: true

      - name: Rebuild package index
        run: |
          echo "Package index rebuild is manual until the index server is deployed."
          echo "Artifacts are available in this workflow run for manual upload."