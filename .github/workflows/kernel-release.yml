name: Kernel Release

on:
  push:
    branches: [main]
    paths:
      - 'kernel/**'
      - '.github/workflows/kernel-release.yml'
  workflow_dispatch:

# Least privilege by default; the publish job elevates to contents: write.
permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build kernel artifacts and publish to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils

      - name: Build kernel and mkfs
        run: make kernel && make -C kernel tools

      - name: Stage artifacts
        run: |
          mkdir -p dist
          test -f kernel/output/tools/bin/mkfs \
            || (echo "ERROR: mkfs not built" && exit 1)
          test -f kernel/output/tools/bin/dump \
            || (echo "ERROR: dump not built" && exit 1)
          test -f kernel/output/platform/pc/bin/kernel.img \
            || (echo "ERROR: kernel.img not built" && exit 1)
          test -f kernel/output/platform/pc/boot/boot.img \
            || (echo "ERROR: boot.img not built" && exit 1)
          cp kernel/output/tools/bin/mkfs             dist/mkfs-linux-amd64
          cp kernel/output/tools/bin/dump             dist/dump-linux-amd64
          cp kernel/output/platform/pc/bin/kernel.img dist/kernel.img
          cp kernel/output/platform/pc/boot/boot.img  dist/boot.img
          chmod +x dist/mkfs-linux-amd64 dist/dump-linux-amd64
          VERSION="v$(cat kernel/VERSION | tr -d '[:space:]')"
          echo "$VERSION" > dist/kernel-version.txt
          echo "KERNEL_VERSION=$VERSION" >> "$GITHUB_ENV"
          file dist/mkfs-linux-amd64 dist/dump-linux-amd64 dist/kernel.img dist/boot.img

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="kernel-${KERNEL_VERSION}"
          # Create the versioned release if it does not already exist.
          gh release view "$TAG" > /dev/null 2>&1 \
            || gh release create "$TAG" \
               --title "Kernel ${KERNEL_VERSION}" \
               --notes "Kernel build from commit $(git rev-parse --short HEAD)"
          gh release upload "$TAG" \
            dist/mkfs-linux-amd64 dist/dump-linux-amd64 dist/kernel.img dist/boot.img dist/kernel-version.txt \
            --clobber

      - name: Update rolling latest release (kernel assets only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest --prerelease \
            --title "latest" --notes "Rolling latest release" \
            2>/dev/null || true
          # Upload only kernel assets — never touch CLI binaries in this pipeline.
          gh release upload latest \
            dist/mkfs-linux-amd64 dist/dump-linux-amd64 dist/kernel.img dist/boot.img dist/kernel-version.txt \
            --clobber
