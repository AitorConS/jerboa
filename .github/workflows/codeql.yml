name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  schedule:
    - cron: '0 3 * * 1' # weekly, Mondays 03:00 UTC

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: go
          queries: security-and-quality

      - name: Build
        # The daemon and vm package are linux-only; build the whole module for Linux
        # so CodeQL traces all reachable code paths.
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:go"
