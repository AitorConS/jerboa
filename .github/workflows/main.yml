name: Main Branch

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

# Prevent multiple concurrent release builds; cancel old ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run unit tests
        run: go test ./cmd/... ./internal/... ./pkg/... -race -count=1 -coverprofile=coverage.out -covermode=atomic

  kernel-build:
    name: Kernel Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils

      - name: Build kernel
        run: make kernel

  integration-tests:
    name: Integration Tests
    needs: [lint, unit-tests]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build CLI binaries
        run: make build

      - name: Run integration tests
        run: go test -tags integration -count=1 -timeout 10m -v ./tests/integration/...

  e2e-tests:
    name: E2E Tests
    needs: [lint, unit-tests, kernel-build]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build kernel and tools
        run: make kernel && make -C kernel tools

      - name: Build CLI binaries
        run: make build

      - name: Run E2E tests
        run: go test -tags e2e -count=1 -timeout 30m -v ./tests/e2e/...

  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, e2e-tests]
    timeout-minutes: 15
    outputs:
      version: ${{ steps.read-version.outputs.version }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Read version
        id: read-version
        run: |
          VERSION="v$(cat VERSION | tr -d '[:space:]')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CLI_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build uni
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${CLI_VERSION}" \
            -o dist/uni-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/uni

      - name: Build unid
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${CLI_VERSION}" \
            -o dist/unid-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/unid

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      - name: Read version
        run: |
          VERSION="v$(cat VERSION | tr -d '[:space:]')"
          echo "CLI_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${CLI_VERSION}"
          gh release view "$TAG" > /dev/null 2>&1 \
            || gh release create "$TAG" \
               --title "uni ${CLI_VERSION}" \
               --notes "Release ${CLI_VERSION} — built from commit $(git rev-parse --short HEAD)"
          gh release upload "$TAG" dist/* --clobber

      - name: Update rolling latest release (CLI assets only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest --prerelease \
            --title "latest" --notes "Rolling latest release" \
            2>/dev/null || true
          # Upload only CLI binaries — never touch kernel assets in this pipeline.
          gh release upload latest dist/uni-* dist/unid-* --clobber

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Generate coverage
        run: |
          go test ./cmd/... ./internal/... ./pkg/... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: HTML report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage.html
