name: Main Branch

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

# Prevent multiple concurrent release builds; cancel old ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tidy-check:
    name: go mod tidy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check go.mod / go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "go.mod or go.sum is out of sync. Run 'go mod tidy' locally and commit the result."
            exit 1
          }

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run unit tests
        run: go test ./cmd/... ./internal/... ./pkg/... -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Enforce coverage threshold (60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !(${COVERAGE} + 0 < 60) }"; then
            echo "::error::Coverage ${COVERAGE}% is below the 60% minimum threshold. Add tests to bring it back up."
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out

  vuln-check:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  kernel-build:
    name: Kernel Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils

      - name: Build kernel
        run: make kernel

  integration-tests:
    name: Integration Tests
    needs: [lint, unit-tests]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build CLI binaries
        run: make build

      - name: Run integration tests
        run: go test -tags integration -count=1 -timeout 10m -v ./tests/integration/...

  e2e-tests:
    name: E2E Tests
    needs: [lint, unit-tests, kernel-build]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build kernel and tools
        run: make kernel && make -C kernel tools

      - name: Build CLI binaries
        run: make build

      - name: Run E2E tests
        run: go test -tags e2e -count=1 -timeout 30m -v ./tests/e2e/...

  image-benchmarks:
    name: Image Build & Boot Benchmarks
    needs: [lint, unit-tests]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Verify toolchain
        run: |
          for tool in gcc nasm qemu-system-x86_64; do
            command -v "$tool" || { echo "ERROR: $tool not found — pre-install on runner: sudo apt-get install -y gcc-multilib nasm qemu-system-x86"; exit 1; }
          done

      - name: Build kernel and tools
        run: make kernel && make -C kernel tools

      - name: Build CLI
        run: make build

      - name: Start unid daemon
        run: |
          BENCH_SOCK=/tmp/bench-unid.sock
          BENCH_STORE=$(mktemp -d)
          echo "BENCH_SOCK=${BENCH_SOCK}" >> "$GITHUB_ENV"
          echo "BENCH_STORE=${BENCH_STORE}" >> "$GITHUB_ENV"
          ./dist/unid --socket "${BENCH_SOCK}" &
          echo "UNID_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 20); do [ -S "${BENCH_SOCK}" ] && break; sleep 0.5; done
          [ -S "${BENCH_SOCK}" ] || { echo "unid failed to start"; exit 1; }

      - name: Benchmark — build hello
        id: build-bench
        run: |
          BUILD_OUT=$(./dist/uni --socket "${BENCH_SOCK}" --store "${BENCH_STORE}" \
            build examples/hello --name bench-hello \
            --mkfs kernel/output/tools/bin/mkfs)
          echo "${BUILD_OUT}"
          BUILD_TIME=$(echo "${BUILD_OUT}" | grep -oP 'built in \K\S+')
          IMAGE_SIZE=$(echo "${BUILD_OUT}" | grep -oP '\d+(\.\d+)?[KMGT]?B' | head -1)
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "image_size=${IMAGE_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Benchmark — boot hello (3 runs)
        id: boot-bench
        run: |
          TOTAL=0
          MIN=999999
          for i in 1 2 3; do
            T0=$(date +%s%N)
            ./dist/uni --socket "${BENCH_SOCK}" --store "${BENCH_STORE}" \
              run bench-hello:latest --attach --rm > /dev/null
            T1=$(date +%s%N)
            MS=$(( (T1 - T0) / 1000000 ))
            echo "Run ${i}: ${MS}ms"
            TOTAL=$(( TOTAL + MS ))
            [ "${MS}" -lt "${MIN}" ] && MIN=${MS}
          done
          AVG=$(( TOTAL / 3 ))
          echo "boot_avg_ms=${AVG}" >> "$GITHUB_OUTPUT"
          echo "boot_min_ms=${MIN}" >> "$GITHUB_OUTPUT"

      - name: Stop daemon
        if: always()
        run: kill "${UNID_PID}" 2>/dev/null || true

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Image Build & Boot Benchmarks"
            echo ""
            echo "App: \`examples/hello\` (Go, prints and exits)"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Build time | ${{ steps.build-bench.outputs.build_time }} |"
            echo "| Image size | ${{ steps.build-bench.outputs.image_size }} |"
            echo "| Boot time avg (3 runs) | ${{ steps.boot-bench.outputs.boot_avg_ms }}ms |"
            echo "| Boot time min (3 runs) | ${{ steps.boot-bench.outputs.boot_min_ms }}ms |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save results as JSON
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > bench-image.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "date": "${DATE}",
            "hello_build_time": "${{ steps.build-bench.outputs.build_time }}",
            "hello_image_size": "${{ steps.build-bench.outputs.image_size }}",
            "hello_boot_avg_ms": ${{ steps.boot-bench.outputs.boot_avg_ms }},
            "hello_boot_min_ms": ${{ steps.boot-bench.outputs.boot_min_ms }}
          }
          EOF

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: image-benchmarks-${{ github.run_id }}
          path: bench-image.json

  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, e2e-tests]
    timeout-minutes: 15
    outputs:
      version: ${{ steps.read-version.outputs.version }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Read version
        id: read-version
        run: |
          VERSION="v$(cat VERSION | tr -d '[:space:]')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CLI_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build uni
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${CLI_VERSION}" \
            -o dist/uni-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/uni

      - name: Build unid
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${CLI_VERSION}" \
            -o dist/unid-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/unid

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      - name: Read version
        run: |
          VERSION="v$(cat VERSION | tr -d '[:space:]')"
          echo "CLI_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${CLI_VERSION}"
          gh release view "$TAG" > /dev/null 2>&1 \
            || gh release create "$TAG" \
               --title "uni ${CLI_VERSION}" \
               --notes "Release ${CLI_VERSION} — built from commit $(git rev-parse --short HEAD)"
          gh release upload "$TAG" dist/* --clobber

      - name: Update rolling latest release (CLI assets only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest --prerelease \
            --title "latest" --notes "Rolling latest release" \
            2>/dev/null || true
          # Upload only CLI binaries — never touch kernel assets in this pipeline.
          gh release upload latest dist/uni-* dist/unid-* --clobber

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-out

      - name: HTML report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage.html
