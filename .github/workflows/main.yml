name: Main Branch

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

# Least privilege by default; jobs that publish elevate explicitly.
permissions:
  contents: read

# Prevent multiple concurrent release builds; cancel old ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tidy-check:
    name: go mod tidy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: Check go.mod / go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "go.mod or go.sum is out of sync. Run 'go mod tidy' locally and commit the result."
            exit 1
          }

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          version: v2.12.2

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: Run unit tests
        run: go test ./cmd/... ./internal/... -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Enforce coverage threshold (60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !(${COVERAGE} + 0 < 60) }"; then
            echo "::error::Coverage ${COVERAGE}% is below the 60% minimum threshold. Add tests to bring it back up."
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-out
          path: coverage.out

  vuln-check:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...

  kernel-build:
    name: Kernel Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils

      - name: Build kernel
        run: make kernel

  integration-tests:
    name: Integration Tests
    needs: [lint, unit-tests]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          # Self-hosted runner: the module cache persists on disk between runs,
          # so setup-go's tarball restore would extract over existing read-only
          # files and fail ("tar: Cannot open: File exists").
          cache: false

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build CLI binaries
        run: make build

      - name: Run integration tests
        run: go test -tags integration -count=1 -timeout 10m -v ./tests/integration/...

  e2e-tests:
    name: E2E Tests
    needs: [lint, unit-tests, kernel-build]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          # Self-hosted runner: the module cache persists on disk between runs,
          # so setup-go's tarball restore would extract over existing read-only
          # files and fail ("tar: Cannot open: File exists").
          cache: false

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build kernel and tools
        run: make kernel && make -C kernel tools

      - name: Build CLI binaries
        run: make build

      - name: Run E2E tests
        run: go test -tags e2e -count=1 -timeout 30m -v ./tests/e2e/...

  image-benchmarks:
    name: Image Build & Boot Benchmarks
    needs: [lint, unit-tests]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          # Self-hosted runner: the module cache persists on disk between runs,
          # so setup-go's tarball restore would extract over existing read-only
          # files and fail ("tar: Cannot open: File exists").
          cache: false

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Verify toolchain
        run: |
          for tool in gcc nasm qemu-system-x86_64 firecracker; do
            command -v "$tool" || { echo "ERROR: $tool not found — see runner setup docs (apt for gcc/nasm/qemu, GitHub releases for firecracker)"; exit 1; }
          done

      - name: Build kernel and tools
        run: make kernel && make -C kernel tools

      - name: Build CLI
        run: make build

      # ── QEMU phase ────────────────────────────────────────────────────────────

      - name: Start QEMU daemon
        run: |
          QEMU_SOCK=/tmp/bench-qemu.sock
          BENCH_STORE=$(mktemp -d)
          # Stage the freshly built kernel toolchain into one directory so the
          # daemon resolves mkfs/boot.img/kernel.img locally instead of
          # downloading a release.
          BENCH_TOOLS=$(mktemp -d)
          cp kernel/output/tools/bin/mkfs "${BENCH_TOOLS}/mkfs"
          cp kernel/output/platform/pc/boot/boot.img "${BENCH_TOOLS}/boot.img"
          cp kernel/output/platform/pc/bin/kernel.img "${BENCH_TOOLS}/kernel.img"
          echo "QEMU_SOCK=${QEMU_SOCK}" >> "$GITHUB_ENV"
          echo "BENCH_STORE=${BENCH_STORE}" >> "$GITHUB_ENV"
          ./dist/jerboad --host "unix://${QEMU_SOCK}" --tools-dir "${BENCH_TOOLS}" &
          echo "QEMU_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 20); do [ -S "${QEMU_SOCK}" ] && break; sleep 0.5; done
          [ -S "${QEMU_SOCK}" ] || { echo "QEMU jerboad failed to start"; exit 1; }

      - name: Benchmark — build hello
        id: build-bench
        run: |
          BUILD_OUT=$(./dist/jerboa --host "unix://${QEMU_SOCK}" --store "${BENCH_STORE}" \
            build examples/hello --name bench-hello --lang go)
          echo "${BUILD_OUT}"
          BUILD_TIME=$(echo "${BUILD_OUT}" | grep -oP 'built in \K\S+')
          IMAGE_SIZE=$(echo "${BUILD_OUT}" | grep -oP '\d+(\.\d+)?[KMGT]?B' | head -1)
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "image_size=${IMAGE_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Benchmark — QEMU boot hello (3 runs)
        id: qemu-bench
        run: |
          TOTAL=0
          MIN=999999
          for i in 1 2 3; do
            T0=$(date +%s%N)
            ./dist/jerboa --host "unix://${QEMU_SOCK}" --store "${BENCH_STORE}" \
              run bench-hello:latest --attach --rm > /dev/null
            T1=$(date +%s%N)
            MS=$(( (T1 - T0) / 1000000 ))
            echo "QEMU run ${i}: ${MS}ms"
            TOTAL=$(( TOTAL + MS ))
            [ "${MS}" -lt "${MIN}" ] && MIN=${MS}
          done
          AVG=$(( TOTAL / 3 ))
          echo "avg_ms=${AVG}" >> "$GITHUB_OUTPUT"
          echo "min_ms=${MIN}" >> "$GITHUB_OUTPUT"

      - name: Stop QEMU daemon
        if: always()
        run: |
          [ -n "${QEMU_PID}" ] && kill "${QEMU_PID}" 2>/dev/null || true
          rm -f /tmp/bench-qemu.sock

      # ── Firecracker phase ─────────────────────────────────────────────────────

      - name: Start Firecracker daemon
        run: |
          FC_SOCK=/tmp/bench-fc.sock
          echo "FC_SOCK=${FC_SOCK}" >> "$GITHUB_ENV"
          ./dist/jerboad --host "unix://${FC_SOCK}" --hypervisor firecracker &
          echo "FC_PID=$!" >> "$GITHUB_ENV"
          # longer wait — first run downloads kernel-fc.img from releases
          for i in $(seq 1 60); do [ -S "${FC_SOCK}" ] && break; sleep 1; done
          [ -S "${FC_SOCK}" ] || { echo "Firecracker jerboad failed to start"; exit 1; }

      - name: Benchmark — Firecracker boot hello (3 runs)
        id: fc-bench
        run: |
          TOTAL=0
          MIN=999999
          for i in 1 2 3; do
            T0=$(date +%s%N)
            ./dist/jerboa --host "unix://${FC_SOCK}" --store "${BENCH_STORE}" \
              run bench-hello:latest --attach --rm > /dev/null
            T1=$(date +%s%N)
            MS=$(( (T1 - T0) / 1000000 ))
            echo "FC run ${i}: ${MS}ms"
            TOTAL=$(( TOTAL + MS ))
            [ "${MS}" -lt "${MIN}" ] && MIN=${MS}
          done
          AVG=$(( TOTAL / 3 ))
          echo "avg_ms=${AVG}" >> "$GITHUB_OUTPUT"
          echo "min_ms=${MIN}" >> "$GITHUB_OUTPUT"

      - name: Stop Firecracker daemon
        if: always()
        run: |
          [ -n "${FC_PID}" ] && kill "${FC_PID}" 2>/dev/null || true
          rm -f /tmp/bench-fc.sock

      # ── Results ───────────────────────────────────────────────────────────────

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Image Build & Boot Benchmarks"
            echo ""
            echo "App: \`examples/hello\` (Go, prints and exits)"
            echo ""
            echo "| Metric | QEMU | Firecracker |"
            echo "|--------|------|-------------|"
            echo "| Build time | ${{ steps.build-bench.outputs.build_time }} | — |"
            echo "| Image size | ${{ steps.build-bench.outputs.image_size }} | — |"
            echo "| Boot avg (3 runs) | ${{ steps.qemu-bench.outputs.avg_ms }}ms | ${{ steps.fc-bench.outputs.avg_ms }}ms |"
            echo "| Boot min (3 runs) | ${{ steps.qemu-bench.outputs.min_ms }}ms | ${{ steps.fc-bench.outputs.min_ms }}ms |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save results as JSON
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > bench-image.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "date": "${DATE}",
            "hello_build_time": "${{ steps.build-bench.outputs.build_time }}",
            "hello_image_size": "${{ steps.build-bench.outputs.image_size }}",
            "qemu_boot_avg_ms": ${{ steps.qemu-bench.outputs.avg_ms }},
            "qemu_boot_min_ms": ${{ steps.qemu-bench.outputs.min_ms }},
            "fc_boot_avg_ms": ${{ steps.fc-bench.outputs.avg_ms }},
            "fc_boot_min_ms": ${{ steps.fc-bench.outputs.min_ms }}
          }
          EOF

      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: image-benchmarks-${{ github.run_id }}
          path: bench-image.json

  build-distro:
    name: Build WSL2 Distro Rootfs
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: Install kernel toolchain deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils

      - name: Build kernel and tools
        run: make kernel && make -C kernel tools

      - name: Build distro rootfs
        run: bash distro/build.sh

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: distro-rootfs
          path: jerboa-rootfs-amd64.tar.gz

  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, e2e-tests]
    timeout-minutes: 15
    outputs:
      version: ${{ steps.read-version.outputs.version }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: Read version
        id: read-version
        run: |
          VERSION="v$(cat VERSION | tr -d '[:space:]')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CLI_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build jerboa
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${CLI_VERSION}" \
            -o dist/jerboa-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/jerboa

      # The daemon is linux-only (//go:build linux); skip it for other targets.
      - name: Build jerboad
        if: matrix.goos == 'linux'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${CLI_VERSION}" \
            -o dist/jerboad-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/jerboad

      # The installer is windows-only (//go:build windows).
      - name: Build installer
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${CLI_VERSION}" \
            -o dist/jerboa-installer.exe \
            ./cmd/installer

      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, build-distro]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      - name: Download distro rootfs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: distro-rootfs
          path: dist-distro/

      - name: Read version
        run: |
          VERSION="v$(cat VERSION | tr -d '[:space:]')"
          echo "CLI_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${CLI_VERSION}"
          gh release view "$TAG" > /dev/null 2>&1 \
            || gh release create "$TAG" \
               --title "jerboa ${CLI_VERSION}" \
               --notes "Release ${CLI_VERSION} — built from commit $(git rev-parse --short HEAD)"
          gh release upload "$TAG" dist/* dist-distro/jerboa-rootfs-amd64.tar.gz --clobber

      - name: Update rolling latest release (CLI assets only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest --prerelease \
            --title "latest" --notes "Rolling latest release" \
            2>/dev/null || true
          # Upload only CLI binaries, installer, and the distro rootfs — never touch kernel assets.
          gh release upload latest dist/jerboa-* dist/jerboad-* dist-distro/jerboa-rootfs-amd64.tar.gz --clobber

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-out

      - name: HTML report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-html
          path: coverage.html
