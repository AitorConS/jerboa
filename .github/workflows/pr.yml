name: PR Checks

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

# Prevent multiple concurrent runs on the same PR; cancel old ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run unit tests
        run: go test ./cmd/... ./internal/... ./pkg/... -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  kernel-build:
    name: Kernel Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils

      - name: Build kernel
        run: make kernel

  integration-tests:
    name: Integration Tests
    needs: [lint, unit-tests, kernel-build]
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check KVM
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found" && exit 1)
          test -r /dev/kvm && test -w /dev/kvm || (echo "Add runner user to kvm group: sudo usermod -aG kvm \$USER" && exit 1)

      - name: Build kernel and tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib nasm qemu-utils
          make kernel && make -C kernel tools

      - name: Stage kernel artifacts for integration tests
        run: |
          cp kernel/output/platform/pc/bin/kernel.img kernel/output/tools/bin/
          cp kernel/output/platform/pc/boot/boot.img   kernel/output/tools/bin/
          ls -la kernel/output/tools/bin/

      - name: Build CLI binaries
        run: make build

      - name: Run integration tests
        run: go test -tags integration -count=1 -timeout 10m -v ./tests/integration/...

      - name: Upload integration test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: |
            /tmp/unid-integration-test.sock
            coverage.out
